<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mejorador de Prompts</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 760px;
    }

    h1 { font-size: 1.6rem; font-weight: 700; color: #1a1a1a; margin-bottom: .35rem; }
    .subtitle { font-size: .9rem; color: #666; margin-bottom: 2rem; }

    label { display: block; font-size: .85rem; font-weight: 600; color: #444; margin-bottom: .5rem; }

    input[type="password"], textarea {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: .85rem 1rem;
      font-size: .95rem;
      font-family: inherit;
      transition: border-color .2s;
      color: #222;
      background: #fafafa;
    }

    textarea { resize: vertical; min-height: 140px; }

    input[type="password"]:focus, textarea:focus {
      outline: none;
      border-color: #4f46e5;
      background: #fff;
    }

    button {
      margin-top: 1.2rem;
      width: 100%;
      padding: .85rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }

    button:hover:not(:disabled) { background: #4338ca; }
    button:disabled { opacity: .6; cursor: not-allowed; }

    .divider { border: none; border-top: 1.5px solid #eee; margin: 2rem 0; }

    .result-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .5rem;
    }

    #copy-btn {
      width: auto; margin-top: 0; padding: .4rem .9rem;
      font-size: .8rem; background: #f0f0f0; color: #333;
      border-radius: 6px; font-weight: 500;
    }
    #copy-btn:hover:not(:disabled) { background: #e0e0e0; }

    #result {
      background: #f9f8ff;
      border: 1.5px solid #e0deff;
      border-radius: 8px;
      padding: 1rem;
      font-size: .93rem;
      line-height: 1.65;
      color: #222;
      white-space: pre-wrap;
      min-height: 80px;
    }

    .placeholder-text { color: #aaa; font-style: italic; }
    .error-text { color: #dc2626; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Login screen */
    #login-screen { display: flex; flex-direction: column; }
    #login-screen .lock { font-size: 2.5rem; text-align: center; margin-bottom: 1rem; }
    #login-screen h1 { text-align: center; }
    #login-screen .subtitle { text-align: center; }
    #login-error { color: #dc2626; font-size: .85rem; margin-top: .5rem; display: none; }

    /* Main app */
    #app-screen { display: none; }
  </style>
</head>
<body>
  <div class="card">

    <!-- PANTALLA DE LOGIN -->
    <div id="login-screen">
      <div class="lock">🔒</div>
      <h1>Mejorador de Prompts</h1>
      <p class="subtitle">Ingresa la contraseña para continuar</p>

      <div style="margin-top: 1.5rem">
        <label for="password-input">Contraseña</label>
        <input type="password" id="password-input" placeholder="••••••••" />
        <div id="login-error">Contraseña incorrecta. Intenta de nuevo.</div>
        <button onclick="doLogin()">Entrar</button>
      </div>
    </div>

    <!-- PANTALLA PRINCIPAL -->
    <div id="app-screen">
      <div style="display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:1rem; margin-bottom:.35rem;">
        <h1 id="app-title">✨ Mejorador de Prompts</h1>
        <!-- Selector de idioma -->
        <div style="display:flex; gap:.5rem; margin-top:.2rem;">
          <button id="btn-es" onclick="setLanguage('es')" style="width:auto; margin-top:0; padding:.4rem 1rem; font-size:.85rem; border-radius:20px;">🇲🇽 Español</button>
          <button id="btn-en" onclick="setLanguage('en')" style="width:auto; margin-top:0; padding:.4rem 1rem; font-size:.85rem; border-radius:20px; background:#e5e7eb; color:#333;">🇺🇸 English</button>
        </div>
      </div>
      <p class="subtitle" id="app-subtitle">Optimiza tus prompts usando el framework TCEPF (Tarea · Contexto · Ejemplos · Persona · Tono · Formato)</p>

      <label for="input-prompt" id="label-input">Tu prompt original</label>
      <textarea id="input-prompt" placeholder="Escribe aquí el prompt que quieres mejorar..."></textarea>

      <button id="improve-btn" onclick="improvePrompt()">Mejorar prompt</button>

      <hr class="divider" />

      <div class="result-label">
        <label style="margin-bottom:0" id="label-result">Prompt mejorado</label>
        <button id="copy-btn" onclick="copyResult()" style="display:none">Copiar</button>
      </div>
      <div id="result"><span class="placeholder-text" id="placeholder-text">El prompt mejorado aparecerá aquí…</span></div>
    </div>

  </div>

  <script>
    let sessionPassword = "";
    let currentLanguage = "es";

    const texts = {
      es: {
        title: "✨ Mejorador de Prompts",
        subtitle: "Optimiza tus prompts usando el framework TCEPF (Tarea · Contexto · Ejemplos · Persona · Tono · Formato)",
        labelInput: "Tu prompt original",
        placeholder: "Escribe aquí el prompt que quieres mejorar...",
        btnImprove: "Mejorar prompt",
        labelResult: "Prompt mejorado",
        placeholderResult: "El prompt mejorado aparecerá aquí…",
        processing: "Procesando tu prompt…",
        copy: "Copiar",
        copied: "¡Copiado!",
        improving: "Mejorando…",
        emptyAlert: "Por favor escribe un prompt primero.",
      },
      en: {
        title: "✨ Prompt Improver",
        subtitle: "Optimize your prompts using the TCEPF framework (Task · Context · Examples · Persona · Tone · Format)",
        labelInput: "Your original prompt",
        placeholder: "Write here the prompt you want to improve...",
        btnImprove: "Improve prompt",
        labelResult: "Improved prompt",
        placeholderResult: "The improved prompt will appear here…",
        processing: "Processing your prompt…",
        copy: "Copy",
        copied: "Copied!",
        improving: "Improving…",
        emptyAlert: "Please write a prompt first.",
      }
    };

    function setLanguage(lang) {
      currentLanguage = lang;
      const t = texts[lang];
      document.getElementById("app-title").textContent = t.title;
      document.getElementById("app-subtitle").textContent = t.subtitle;
      document.getElementById("label-input").textContent = t.labelInput;
      document.getElementById("input-prompt").placeholder = t.placeholder;
      document.getElementById("improve-btn").textContent = t.btnImprove;
      document.getElementById("label-result").textContent = t.labelResult;
      document.getElementById("copy-btn").textContent = t.copy;

      const resultEl = document.getElementById("result");
      if (resultEl.querySelector(".placeholder-text")) {
        resultEl.innerHTML = `<span class="placeholder-text">${t.placeholderResult}</span>`;
      }

      // Estilos de los botones de idioma
      document.getElementById("btn-es").style.background = lang === "es" ? "#4f46e5" : "#e5e7eb";
      document.getElementById("btn-es").style.color = lang === "es" ? "#fff" : "#333";
      document.getElementById("btn-en").style.background = lang === "en" ? "#4f46e5" : "#e5e7eb";
      document.getElementById("btn-en").style.color = lang === "en" ? "#fff" : "#333";
    }

    // Si ya hay contraseña guardada en sesión, saltar login
    sessionPassword = sessionStorage.getItem("app_password") || "";
    if (sessionPassword) showApp();

    async function doLogin() {
      const input = document.getElementById("password-input");
      const errorEl = document.getElementById("login-error");
      const pwd = input.value;

      if (!pwd) return;

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: pwd }),
        });

        if (res.ok) {
          sessionPassword = pwd;
          sessionStorage.setItem("app_password", pwd);
          errorEl.style.display = "none";
          showApp();
        } else {
          errorEl.style.display = "block";
          input.value = "";
          input.focus();
        }
      } catch {
        errorEl.textContent = "Error de conexión.";
        errorEl.style.display = "block";
      }
    }

    function showApp() {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app-screen").style.display = "block";
    }

    async function improvePrompt() {
      const t = texts[currentLanguage];
      const input = document.getElementById("input-prompt").value.trim();
      if (!input) { alert(t.emptyAlert); return; }

      const btn = document.getElementById("improve-btn");
      const resultEl = document.getElementById("result");
      const copyBtn = document.getElementById("copy-btn");

      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span>${t.improving}`;
      resultEl.innerHTML = `<span class="placeholder-text">${t.processing}</span>`;
      copyBtn.style.display = "none";

      try {
        const res = await fetch("/improve", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: input, password: sessionPassword, language: currentLanguage }),
        });

        const data = await res.json();

        if (res.status === 401) {
          // Contraseña expiró o cambió — volver al login
          sessionStorage.removeItem("app_password");
          sessionPassword = "";
          document.getElementById("login-screen").style.display = "flex";
          document.getElementById("app-screen").style.display = "none";
          resultEl.innerHTML = '<span class="placeholder-text">El prompt mejorado aparecerá aquí…</span>';
        } else if (!res.ok) {
          resultEl.innerHTML = `<span class="error-text">Error: ${data.error || "Error desconocido"}</span>`;
        } else {
          resultEl.textContent = data.improved;
          copyBtn.style.display = "inline-block";
          copyBtn.textContent = t.copy;
        }
      } catch {
        resultEl.innerHTML = `<span class="error-text">Connection error.</span>`;
      } finally {
        btn.disabled = false;
        btn.textContent = t.btnImprove;
      }
    }

    async function copyResult() {
      const t = texts[currentLanguage];
      const text = document.getElementById("result").textContent;
      await navigator.clipboard.writeText(text);
      const btn = document.getElementById("copy-btn");
      btn.textContent = t.copied;
      setTimeout(() => { btn.textContent = t.copy; }, 2000);
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && e.ctrlKey) improvePrompt();
      if (e.key === "Enter" && document.getElementById("login-screen").style.display !== "none") {
        e.preventDefault();
        doLogin();
      }
    });
  </script>
</body>
</html>
